# Samsung Galaxy A23 WiFi configuration
# Qualcomm WCN3950

END

# Device info
gEnableImps=1
gEnableBmps=1

# Beacon filtering
gEnableBypass11d=1
gChannelBondingMode24GHz=0
gChannelBondingMode5GHz=1

# Enable Powersave
gIsImpsEnabled=1
gIsBmpsEnabled=1
gDot11Mode=0
gWlanMccToSccSwitchMode=3

# BTC mode
gBtcMode=2

# Short GI
gShortGI20Mhz=1
gShortGI40Mhz=1

# Data inactivity timeout
gDataInactivityTimeout=200

# WFD
gEnableWifiDisplay=1

# NAN support
gEnableNanSupport=1

# TDLS options
gEnableTDLSSupport=1
gEnableTDLSImplicitTrigger=1
gEnableTDLSExternalControl=1
gTDLSUapsdMask=0x0F
gEnableTDLSWmmMode=1

# Max concurrent connections
gMaxConcurrentActiveSessions=2

# SoftAP max client
gSoftApMaxPeers=32

# Enable/Disable MCC Adaptive Scheduler
gEnableMCCAdaptiveScheduler=1
